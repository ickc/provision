version: '3'

tasks:
  init:
    desc: Initialize submodules after a fresh clone
    cmds:
      - git submodule update --init --recursive

  update:
    desc: Pull latest commits in all submodules
    cmds:
      - git submodule update --remote --merge

  symlink:
    desc: Symlink dotfiles, sman-snippets, and navi-cheatsheets to their expected locations
    cmds:
      - cd submodule/dotfiles && make all
      - mkdir -p "${XDG_DATA_HOME:-${HOME}/.local/share}/sman"
      - ln -sfn {{.ROOT_DIR}}/submodule/sman-snippets "${XDG_DATA_HOME:-${HOME}/.local/share}/sman/snippets"
      - mkdir -p "${XDG_DATA_HOME:-${HOME}/.local/share}/navi"
      - ln -sfn {{.ROOT_DIR}}/submodule/navi-cheatsheets "${XDG_DATA_HOME:-${HOME}/.local/share}/navi/cheats"
