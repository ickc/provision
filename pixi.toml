[workspace]
name = "bootstrap"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.10,<4"

[tasks]
# Bootstrap tasks — driven by the Python orchestration package in src/bootstrap/
bootstrap = { cmd = "PYTHONPATH=src python -m bootstrap", description = "Full personal bootstrap: envoy tools, dotfiles, data repos, SSH identity (path 1)" }
bootstrap-public = { cmd = "PYTHONPATH=src python -m bootstrap --public", description = "Public bootstrap: envoy tools + dotfiles via HTTPS, no ssh-dir (path 2)" }

# Development tasks — submodule management
init = { cmd = "git submodule update --init --recursive", description = "Initialize submodules after a fresh clone" }
update = { cmd = "git submodule update --remote --merge", description = "Pull latest commits in all submodules" }
